testimonials:
  - text: There is no curse in entish, elvish, or the tounges of men for such treachery
    source: richernate
  - text: Don’t give Honda any more terrible ideas, they are quite capable of coming up with them on their own
    source: fondrenlock
  - text: |
      I look forward to the callouts of “I somehow got a plastic printed key stuck in my ignition!”
      Had a few already last year
    source: Wackobacco
  - text: Nope you’ll be waiting a while we are too busy to deal with self inflicted bullshit
    source: Pbellouny
  - text: |
      If you were not aware a big part of the negative here - the hon66 keyway locks are quite literally the worst locks currently on the road
      They’re made out of paper and fail constantly from a key that’s even slightly off spec
      So about the worst locks currently you could have chosen to do this on
    source: Locksandshit
